<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Roamly — Melbourne</title>

  <!-- Leaflet map library (loaded from the internet, no install needed) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Roamly brand fonts from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- The app-shell is the phone frame that wraps everything -->
  <div class="app-shell">

    <!-- ══════════════════════════════════════
         SCREEN 1 — HOME (category selection)
         ══════════════════════════════════════ -->
    <div id="screen-home" class="screen active">
      <div class="home-inner">

        <header class="top-bar">
          <span class="wordmark">Roamly</span>
          <button class="icon-btn" id="btn-open-calendar" aria-label="Your trip">
            <!-- Calendar SVG icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span class="badge" id="badge-home">0</span>
          </button>
        </header>

        <div class="home-copy">
          <h1 class="heading">What's the vibe<br>for Melbourne?</h1>
          <p class="subtext">Pick a mood. We'll light up the city.</p>
        </div>

        <!-- 6 category cards in a 2-column grid -->
        <div class="category-grid">

          <button class="cat-card" data-cat="food">
            <span class="cat-icon">🍜</span>
            <span class="cat-name">Food</span>
          </button>

          <button class="cat-card" data-cat="nightlife">
            <span class="cat-icon">🌙</span>
            <span class="cat-name">Nightlife</span>
          </button>

          <button class="cat-card" data-cat="livemusic">
            <span class="cat-icon">🎸</span>
            <span class="cat-name">Live Music</span>
          </button>

          <button class="cat-card" data-cat="shopping">
            <span class="cat-icon">🛍️</span>
            <span class="cat-name">Shopping</span>
          </button>

          <button class="cat-card" data-cat="cultural">
            <span class="cat-icon">🏛️</span>
            <span class="cat-name">Cultural</span>
          </button>

          <button class="cat-card" data-cat="outdoors">
            <span class="cat-icon">🌿</span>
            <span class="cat-name">Outdoors</span>
          </button>

        </div>
      </div>
    </div>


    <!-- ══════════════════════════════════════
         SCREEN 2 — MAP
         ══════════════════════════════════════ -->
    <div id="screen-map" class="screen">

      <!-- Floating header sits on top of the map -->
      <header class="top-bar map-bar">
        <button class="icon-btn" id="btn-back-map" aria-label="Back">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="map-title" id="map-title">Food</span>
        <button class="icon-btn" id="btn-open-calendar-map" aria-label="Your trip">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span class="badge" id="badge-map">0</span>
        </button>
      </header>

      <!-- The map fills the whole screen -->
      <div id="map"></div>

      <!-- Hint floats over the bottom of the map -->
      <div class="map-hint">Tap a glowing spot to save it to your trip</div>

    </div>


    <!-- ══════════════════════════════════════
         SCREEN 3 — CALENDAR (saved trip)
         ══════════════════════════════════════ -->
    <div id="screen-calendar" class="screen">

      <header class="top-bar">
        <button class="icon-btn" id="btn-back-cal" aria-label="Back">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="wordmark">Your Trip</span>
        <div style="width:40px"></div>
      </header>

      <p class="cal-subtitle">Melbourne · June 6–12, 2026</p>

      <!-- Week columns generated by JavaScript -->
      <div class="week-scroll">
        <div class="week-grid" id="week-grid"></div>
      </div>

      <!-- Shows only when nothing is saved yet -->
      <div class="cal-empty" id="cal-empty">
        <p class="empty-icon">🗺️</p>
        <p class="empty-text">Nothing saved yet.</p>
        <p class="empty-sub">Go explore the map and tap a glow.</p>
      </div>

    </div>

  </div><!-- end .app-shell -->


  <!-- ══════════════════════════════════════
       BOTTOM SHEET — slides up when user taps map
       ══════════════════════════════════════ -->

  <!-- Dark overlay behind the sheet -->
  <div class="sheet-overlay" id="sheet-overlay"></div>

  <div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-handle"></div>

    <!-- Location info -->
    <div class="sheet-top">
      <span class="sheet-emoji" id="sheet-emoji">🍜</span>
      <div>
        <p class="sheet-location" id="sheet-location">Fitzroy</p>
        <p class="sheet-cat-label" id="sheet-cat-label">Food · Melbourne</p>
      </div>
    </div>

    <!-- Day picker -->
    <p class="sheet-question">Which day?</p>
    <div class="day-row" id="day-row"></div>

    <!-- Save button -->
    <button class="save-btn" id="save-btn">Save to trip</button>
  </div>


  <!-- ── LIBRARIES ── loaded from the internet, no install needed ── -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="script.js"></script>

</body>
</html>
